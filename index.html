        tile.getContext('2d').putImageData(imgData, 0, 0);

        const c = document.createElement('canvas');
        c.width = size * 2; c.height = size * 2;
        const ctx = c.getContext('2d');
        for (let ty = 0; ty < 2; ty++)
            for (let tx = 0; tx < 2; tx++)
                ctx.drawImage(tile, tx * size, ty * size);
        const a = document.createElement('a');
        a.download = `texture_${state.type}_2x2_${size}px.png`;
        a.href = c.toDataURL('image/png');
        a.click();
        document.getElementById('loading').classList.remove('on');
    }, 50);
}

// ============================================================
// SVG VECTOR EXPORT (marching squares iso-contour)
// ============================================================
function fieldToPaths(field, w, h, threshold) {
    // Pad the field with a 1-cell BACKGROUND border so every iso-contour closes
    // into a proper loop. Open contours dangling at the tile edge cannot be
    // filled correctly with fill-rule:evenodd and were the real cause of the
    // "broken lines / non-continuous shapes" artifact. Coordinates are shifted
    // back by the 1-cell pad after chaining.
    const BG = threshold - 1; // guaranteed < threshold => border counts as "outside"
    const pw = w + 2, ph = h + 2;
    const V = (x, y) => {
        const rx = x - 1, ry = y - 1;
        if (rx < 0 || ry < 0 || rx >= w || ry >= h) return BG;
        return field[ry * w + rx];
    };
    const segs = [];
    const key = (px, py) => Math.round(px * 1000) + ',' + Math.round(py * 1000);
    for (let y = 0; y < ph - 1; y++) {
        for (let x = 0; x < pw - 1; x++) {
            const tl = V(x, y), tr = V(x + 1, y), br = V(x + 1, y + 1), bl = V(x, y + 1);
            let ci = 0;
            if (tl >= threshold) ci |= 8;
            if (tr >= threshold) ci |= 4;
            if (br >= threshold) ci |= 2;
            if (bl >= threshold) ci |= 1;
            if (ci === 0 || ci === 15) continue;
            const lerp = (a, b) => { const dd = b - a; return Math.abs(dd) < 1e-9 ? 0.5 : (threshold - a) / dd; };
            const top    = [x + lerp(tl, tr), y];
            const right  = [x + 1, y + lerp(tr, br)];
            const bottom = [x + lerp(bl, br), y + 1];
            const left   = [x, y + lerp(tl, bl)];
            const add = (p, q) => segs.push([p, q]);
            switch (ci) {
                case 1:  add(left, bottom); break;
                case 2:  add(bottom, right); break;
                case 3:  add(left, right); break;
                case 4:  add(top, right); break;
                case 5:  add(left, top); add(bottom, right); break;
                case 6:  add(top, bottom); break;
                case 7:  add(left, top); break;
                case 8:  add(top, left); break;
                case 9:  add(top, bottom); break;
                case 10: add(top, right); add(bottom, left); break;
                case 11: add(top, right); break;    // only TR outside -> cut top+right (was wrongly bottom+right)
                case 12: add(left, right); break;
                case 13: add(bottom, right); break; // only BR outside -> cut bottom+right (was wrongly right+top)
                case 14: add(bottom, left); break;
            }
        }
    }
    // Link segments into polylines. Marching-squares segments are NOT guaranteed
    // to be oriented consistently, so we chain BIDIRECTIONALLY: index every
    // segment by BOTH endpoints, then grow each polyline from both its head and
    // its tail, flipping segments as needed. This prevents the "broken / shattered
    // line" artifact caused by the old single-direction (start->end only) chaining.
    const pk = (p) => key(p[0], p[1]);
    const adj = new Map(); // point-key -> [segIndexA, segIndexB, ...]
    const addAdj = (k, i) => { let a = adj.get(k); if (!a) { a = []; adj.set(k, a); } a.push(i); };
    segs.forEach((s, i) => { addAdj(pk(s[0]), i); addAdj(pk(s[1]), i); });
    const used = new Array(segs.length).fill(false);
    const paths = [];
    const nextFrom = (k) => {
        const cand = adj.get(k);
        if (cand) for (const c of cand) if (!used[c]) return c;
        return -1;
    };
    for (let i = 0; i < segs.length; i++) {
        if (used[i]) continue;
        used[i] = true;
        const pts = [segs[i][0], segs[i][1]];
        // grow tail: keep attaching a segment that shares the current end point
        let guard = 0;
        while (guard++ < segs.length + 5) {
            const endPt = pts[pts.length - 1];
            const k = pk(endPt);
            const nxt = nextFrom(k);
            if (nxt < 0) break;
            used[nxt] = true;
            const s = segs[nxt];
            pts.push(pk(s[0]) === k ? s[1] : s[0]); // flip if needed
            if (pk(pts[pts.length - 1]) === pk(pts[0])) break; // closed loop
        }
        // grow head: attach segments that share the current start point
        guard = 0;
        while (guard++ < segs.length + 5) {
            const startPt = pts[0];
            const k = pk(startPt);
            if (pk(pts[pts.length - 1]) === k) break; // already closed
            const nxt = nextFrom(k);
            if (nxt < 0) break;
            used[nxt] = true;
            const s = segs[nxt];
            pts.unshift(pk(s[0]) === k ? s[1] : s[0]);
        }
        if (pts.length >= 2) paths.push(pts);
    }
    // undo the 1-cell padding shift -> map coordinates back onto the [0..w]x[0..h] grid
    return paths.map(pts => pts.map(p => [p[0] - 1, p[1] - 1]));
}

function pathsToD(paths, sx, sy) {
    return paths.map(pts =>
        'M' + pts.map(p => (p[0] * sx).toFixed(2) + ' ' + (p[1] * sy).toFixed(2)).join(' L') + ' Z'
    ).join(' ');
}

// ---- SVG path optimization: simplify (RDP) + smooth (Catmull-Rom -> cubic Bezier) ----
// The marching-squares output has one vertex per grid edge, so a single blob can be
// hundreds of tiny segments. Extruding that in 3D software creates a huge face count.
// We (1) drop redundant vertices with Ramer-Douglas-Peucker while preserving shape,
// then (2) optionally replace the resulting polygon with a smooth closed Bezier curve.

// perpendicular distance from point p to the infinite line through a-b
function perpDist(p, a, b) {
    const dx = b[0] - a[0], dy = b[1] - a[1];
    const l2 = dx * dx + dy * dy;
    if (l2 === 0) { const ex = p[0] - a[0], ey = p[1] - a[1]; return Math.hypot(ex, ey); }
    const t = ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / l2;
    const px = a[0] + t * dx, py = a[1] + t * dy;
    return Math.hypot(p[0] - px, p[1] - py);
}

// Ramer-Douglas-Peucker on an OPEN polyline (keeps first & last)
function rdp(pts, eps) {
    if (pts.length < 3) return pts.slice();
    const keep = new Array(pts.length).fill(false);
    keep[0] = keep[pts.length - 1] = true;
    const stack = [[0, pts.length - 1]];
    while (stack.length) {
        const [s, e] = stack.pop();
        let maxD = 0, idx = -1;
        for (let i = s + 1; i < e; i++) {
            const d = perpDist(pts[i], pts[s], pts[e]);
            if (d > maxD) { maxD = d; idx = i; }
        }
        if (maxD > eps && idx > 0) { keep[idx] = true; stack.push([s, idx], [idx, e]); }
    }
    return pts.filter((_, i) => keep[i]);
}

// RDP for a CLOSED loop (pts[0] === pts[last]). Split at the farthest point from the
// start so the simplification is orientation-independent, then re-close.
function simplifyClosed(pts, eps) {
    if (!eps || eps <= 0 || pts.length < 5) return pts;
    const same = pts[0][0] === pts[pts.length - 1][0] && pts[0][1] === pts[pts.length - 1][1];
    const open = same ? pts.slice(0, -1) : pts.slice();
    const n = open.length;
    if (n < 5) return pts;
    let far = 0, fd = -1;
    for (let i = 1; i < n; i++) {
        const dx = open[i][0] - open[0][0], dy = open[i][1] - open[0][1];
        const d = dx * dx + dy * dy;
        if (d > fd) { fd = d; far = i; }
    }
    const A = open.slice(0, far + 1);
    const B = open.slice(far).concat([open[0]]);
    const ra = rdp(A, eps), rb = rdp(B, eps);
    const merged = ra.slice(0, -1).concat(rb.slice(0, -1));
    if (merged.length < 3) return pts;
    merged.push(merged[0].slice());
    return merged;
}

// Closed Catmull-Rom -> cubic Bezier path string. tension: 0 = none, 1 = standard.
function closedBezierD(pts, sx, sy, tension) {
    let P = pts;
    const m = P.length;
    if (m > 1 && P[0][0] === P[m - 1][0] && P[0][1] === P[m - 1][1]) P = P.slice(0, -1);
    const n = P.length;
    if (n < 3) return '';
    const S = i => { const q = P[((i % n) + n) % n]; return [q[0] * sx, q[1] * sy]; };
    const p0 = S(0);
    let d = 'M' + p0[0].toFixed(2) + ' ' + p0[1].toFixed(2);
    for (let i = 0; i < n; i++) {
        const a = S(i - 1), b = S(i), c = S(i + 1), e = S(i + 2);
        const c1x = b[0] + (c[0] - a[0]) / 6 * tension;
        const c1y = b[1] + (c[1] - a[1]) / 6 * tension;
        const c2x = c[0] - (e[0] - b[0]) / 6 * tension;
        const c2y = c[1] - (e[1] - b[1]) / 6 * tension;
        d += ' C' + c1x.toFixed(2) + ' ' + c1y.toFixed(2) + ' ' +
             c2x.toFixed(2) + ' ' + c2y.toFixed(2) + ' ' +
             c[0].toFixed(2) + ' ' + c[1].toFixed(2);
    }
    return d + ' Z';
}

// Convert paths to an SVG "d" attribute, applying simplify (tol) and smooth (tension).
function pathsToOptimizedD(paths, sx, sy, tol, tension) {
    return paths.map(pts => {
        const s = simplifyClosed(pts, tol);
        if (s.length < 4) return '';
        if (tension > 0) return closedBezierD(s, sx, sy, tension);
        return 'M' + s.map(p => (p[0] * sx).toFixed(2) + ' ' + (p[1] * sy).toFixed(2)).join(' L') + ' Z';
    }).filter(Boolean).join(' ');
}

// ============================================================
// CONTOUR (topo) STROKE VECTOR EXPORT
// ============================================================
// Unlike the reaction FILL export, contour iso-lines are STROKED. The pitfall we
// hit before was padding the field with a background border: that padding is what
// closes a FILL into clean loops, but on a STROKE it draws a fake rectangle along
// the tile edge. So contourToPaths does NOT pad — lines reaching the boundary are
// simply left OPEN. We still reuse the battle-tested bidirectional chaining (fixes
// the old "shattered line" artifact) and the corrected marching-squares cases
// 11/13 that were previously wrong.
function contourToPaths(field, w, h, threshold) {
    const V = (x, y) => field[y * w + x];
    const segs = [];
    const key = (px, py) => Math.round(px * 1000) + ',' + Math.round(py * 1000);
    for (let y = 0; y < h - 1; y++) {
        for (let x = 0; x < w - 1; x++) {
            const tl = V(x, y), tr = V(x + 1, y), br = V(x + 1, y + 1), bl = V(x, y + 1);
            let ci = 0;
            if (tl >= threshold) ci |= 8;
            if (tr >= threshold) ci |= 4;
            if (br >= threshold) ci |= 2;
            if (bl >= threshold) ci |= 1;
            if (ci === 0 || ci === 15) continue;
            const lerp = (a, b) => { const dd = b - a; return Math.abs(dd) < 1e-9 ? 0.5 : (threshold - a) / dd; };
            const top    = [x + lerp(tl, tr), y];
            const right  = [x + 1, y + lerp(tr, br)];
            const bottom = [x + lerp(bl, br), y + 1];
            const left   = [x, y + lerp(tl, bl)];
            const add = (p, q) => segs.push([p, q]);
            switch (ci) {
                case 1:  add(left, bottom); break;
                case 2:  add(bottom, right); break;
                case 3:  add(left, right); break;
                case 4:  add(top, right); break;
                case 5:  add(left, top); add(bottom, right); break;
                case 6:  add(top, bottom); break;
                case 7:  add(left, top); break;
                case 8:  add(top, left); break;
                case 9:  add(top, bottom); break;
                case 10: add(top, right); add(bottom, left); break;
                case 11: add(top, right); break;
                case 12: add(left, right); break;
                case 13: add(bottom, right); break;
                case 14: add(bottom, left); break;
            }
        }
    }
    // bidirectional chaining (open polylines allowed; no forced closing)
    const pk = (p) => key(p[0], p[1]);
    const adj = new Map();
    const addAdj = (k, i) => { let a = adj.get(k); if (!a) { a = []; adj.set(k, a); } a.push(i); };
    segs.forEach((s, i) => { addAdj(pk(s[0]), i); addAdj(pk(s[1]), i); });
    const used = new Array(segs.length).fill(false);
    const paths = [];
    const nextFrom = (k) => { const c = adj.get(k); if (c) for (const i of c) if (!used[i]) return i; return -1; };
    for (let i = 0; i < segs.length; i++) {
        if (used[i]) continue;
        used[i] = true;
        const pts = [segs[i][0], segs[i][1]];
        let guard = 0;
        while (guard++ < segs.length + 5) {
            const k = pk(pts[pts.length - 1]);
            const nxt = nextFrom(k);
            if (nxt < 0) break;
            used[nxt] = true;
            const s = segs[nxt];
            pts.push(pk(s[0]) === k ? s[1] : s[0]);
            if (pk(pts[pts.length - 1]) === pk(pts[0])) break; // closed loop
        }
        guard = 0;
        while (guard++ < segs.length + 5) {
            const k = pk(pts[0]);
            if (pk(pts[pts.length - 1]) === k) break; // already closed
            const nxt = nextFrom(k);
            if (nxt < 0) break;
            used[nxt] = true;
            const s = segs[nxt];
            pts.unshift(pk(s[0]) === k ? s[1] : s[0]);
        }
        if (pts.length >= 2) paths.push(pts);
    }
    return paths;
}

// Open Catmull-Rom -> cubic Bezier (endpoints clamped). No Z: the stroke stays open.
function openBezierD(pts, sx, sy, tension) {
    const n = pts.length;
    if (n < 2) return '';
    const S = i => { const j = Math.max(0, Math.min(n - 1, i)); return [pts[j][0] * sx, pts[j][1] * sy]; };
    const p0 = S(0);
    let d = 'M' + p0[0].toFixed(2) + ' ' + p0[1].toFixed(2);
    if (n === 2) { const p1 = S(1); return d + ' L' + p1[0].toFixed(2) + ' ' + p1[1].toFixed(2); }
    for (let i = 0; i < n - 1; i++) {
        const a = S(i - 1), b = S(i), c = S(i + 1), e = S(i + 2);
        const c1x = b[0] + (c[0] - a[0]) / 6 * tension;
        const c1y = b[1] + (c[1] - a[1]) / 6 * tension;
        const c2x = c[0] - (e[0] - b[0]) / 6 * tension;
        const c2y = c[1] - (e[1] - b[1]) / 6 * tension;
        d += ' C' + c1x.toFixed(2) + ' ' + c1y.toFixed(2) + ' ' +
             c2x.toFixed(2) + ' ' + c2y.toFixed(2) + ' ' +
             c[0].toFixed(2) + ' ' + c[1].toFixed(2);
    }
    return d;
}

// Build a stroke "d" for contour polylines: RDP simplify + optional smoothing,
// keeping closed loops closed (Z) and open lines open.
function contourPathsToStrokeD(paths, sx, sy, tol, tension) {
    return paths.map(pts => {
        if (pts.length < 2) return '';
        const closed = pts.length > 3 &&
            pts[0][0] === pts[pts.length - 1][0] && pts[0][1] === pts[pts.length - 1][1];
        if (closed) {
            const s = simplifyClosed(pts, tol);
            if (s.length < 3) return '';
            if (tension > 0) return closedBezierD(s, sx, sy, tension);
            return 'M' + s.map(p => (p[0] * sx).toFixed(2) + ' ' + (p[1] * sy).toFixed(2)).join(' L') + ' Z';
        }
        const s = tol > 0 ? rdp(pts, tol) : pts;
        if (s.length < 2) return '';
        if (tension > 0) return openBezierD(s, sx, sy, tension);
        return 'M' + s.map(p => (p[0] * sx).toFixed(2) + ' ' + (p[1] * sy).toFixed(2)).join(' L');
    }).filter(Boolean).join(' ');
}

// Recompute the seamless, 0..1-normalized height field used by the contour render,
// at an arbitrary grid resolution for vector extraction (matches generateContour).
function contourHeightField(g, params) {
    const noise = new SimplexNoise4D(params.seed);
    const heights = new Float32Array(g * g);
    for (let y = 0; y < g; y++) {
        const py = y / g;
        for (let x = 0; x < g; x++) {
            heights[y * g + x] = seamlessFBM(x / g, py, params.scale, 4, .5, 2, noise);
        }
    }
    let mn = Infinity, mx = -Infinity;
    for (let i = 0; i < heights.length; i++) { if (heights[i] < mn) mn = heights[i]; if (heights[i] > mx) mx = heights[i]; }
    const range = mx - mn || 1;
    for (let i = 0; i < heights.length; i++) heights[i] = (heights[i] - mn) / range;
    return heights;
}

// Each iso-level -> stroked path(s). Minor & major lines are grouped into just two
// <path>s (uniform style each) to keep the SVG compact.
function exportContourSVG() {
    const p = state.params;
    const g = 512;                       // extraction grid (RDP simplifies afterwards)
    const heights = contourHeightField(g, p);
    const out = state.exportRes;
    const sx = out / (g - 1), sy = out / (g - 1);
    const tol = state.svgSimplify, ten = state.svgSmooth;
    const sf = out / g;                  // stroke-width scale: grid px -> output units

    let minorD = '', majorD = '';
    for (let l = 1; l < p.levels; l++) {
        const d = contourPathsToStrokeD(contourToPaths(heights, g, g, l / p.levels), sx, sy, tol, ten);
        if (!d) continue;
        if (l % p.majorEvery === 0) majorD += (majorD ? ' ' : '') + d;
        else minorD += (minorD ? ' ' : '') + d;
    }

    const minorW = (p.lineWidth * sf).toFixed(2);
    const majorW = ((p.majorBold ? p.lineWidth * 2 : p.lineWidth) * sf).toFixed(2);

    let svg = '<?xml version="1.0" encoding="UTF-8"?>\n';
    svg += `<svg xmlns="http://www.w3.org/2000/svg" width="${out}" height="${out}" viewBox="0 0 ${out} ${out}">\n`;
    svg += `<rect width="${out}" height="${out}" fill="${p.bgColor}"/>\n`;
    if (minorD) svg += `<path d="${minorD}" fill="none" stroke="${p.lineColor}" stroke-width="${minorW}" stroke-opacity="0.6" stroke-linejoin="round" stroke-linecap="round"/>\n`;
    if (majorD) svg += `<path d="${majorD}" fill="none" stroke="${p.majorColor}" stroke-width="${majorW}" stroke-linejoin="round" stroke-linecap="round"/>\n`;
    svg += '</svg>\n';

    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const a = document.createElement('a');
    a.download = `texture_contour_${out}px.svg`;
    a.href = URL.createObjectURL(blob);
    a.click();
    URL.revokeObjectURL(a.href);
}

function exportSVG() {
    if (state.type !== 'reaction' && state.type !== 'contour') { alert(t('svgOnlyReaction')); return; }
    document.getElementById('loading').classList.add('on');
    setTimeout(() => {
        try {
            if (state.type === 'contour') { exportContourSVG(); document.getElementById('loading').classList.remove('on'); return; }
            // refresh field with current params (small size — only the field matters)
            generateReactionDiffusion(state.params.gridSize, state.params);
            const fld = lastReactionField;
            if (!fld) { document.getElementById('loading').classList.remove('on'); return; }
            const { v, maskGrid, w, h, threshold } = fld;
            const p = state.params;
            const out = state.exportRes;
            const sx = out / w, sy = out / h;

            const tol = state.svgSimplify, ten = state.svgSmooth;
            const dV = pathsToOptimizedD(fieldToPaths(v, w, h, threshold), sx, sy, tol, ten);
            const dHoles = maskGrid ? pathsToOptimizedD(fieldToPaths(maskGrid, w, h, 0.5), sx, sy, tol, ten) : '';

            let svg = '<?xml version="1.0" encoding="UTF-8"?>\n';
            svg += `<svg xmlns="http://www.w3.org/2000/svg" width="${out}" height="${out}" viewBox="0 0 ${out} ${out}">\n`;
            svg += `<rect width="${out}" height="${out}" fill="${p.colorA}"/>\n`;
            if (dV) svg += `<path d="${dV}" fill="${p.colorB}" fill-rule="evenodd" shape-rendering="geometricPrecision"/>\n`;
            // keep-out holes: punch them back to background so mounting holes stay empty
            if (dHoles) svg += `<path d="${dHoles}" fill="${p.colorA}" fill-rule="evenodd" shape-rendering="geometricPrecision"/>\n`;
            svg += '</svg>\n';

            const blob = new Blob([svg], { type: 'image/svg+xml' });
            const a = document.createElement('a');
            a.download = `texture_reaction_${out}px.svg`;
            a.href = URL.createObjectURL(blob);
            a.click();
            URL.revokeObjectURL(a.href);
        } catch (e) { console.error(e); }
        document.getElementById('loading').classList.remove('on');
    }, 50);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', init);
window.addEventListener('resize', () => { if (genCanvas.width) displayResult(genCanvas.width); });
